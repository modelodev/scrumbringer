schema: awo.config/v1
version: 1
workflows:
  enabled: [user_story_authoring, feature_delivery]
sources: []
targets:
  default: opencode
  items:
    opencode:
      enabled: true
      class: coding_ide
      adapter_kind: opencode
      runtime_root: "."
      commands_dir: ".opencode/commands"
      skills_dir: ".opencode/skills"
budgets:
  default_run:
    tokens_hint: 28000
  default_step:
    tokens_hint: 8000
  enforce: warn
