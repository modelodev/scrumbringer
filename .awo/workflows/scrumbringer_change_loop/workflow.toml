id = "scrumbringer_change_loop"
version = "0.5.0"

[metadata]
namespace = "scrumbringer"
principal_asset = "scrumbringer.change_loop"

[budget]
tokens_hint = 32000

[[steps]]
id = "change_brief"
kind = "llm-subagent"
depends_on = []
inputs = []
outputs = ["change_brief_contract"]
skill_refs = ["bmad-po"]
context_mode = "shared"
done_criteria = ["change scope, constraints, acceptance criteria and success signal are explicit"]
verification_steps = []

[[steps]]
id = "impact_scan"
kind = "llm-subagent"
depends_on = ["change_brief"]
inputs = ["change_brief_contract"]
outputs = ["impact_scan_contract"]
skill_refs = ["bmad-po"]
context_mode = "shared"
done_criteria = ["files, technical risks, regressions and test surface are explicit"]
verification_steps = []

[[steps]]
id = "interaction_review"
kind = "llm-subagent"
depends_on = ["impact_scan"]
inputs = ["impact_scan_contract"]
outputs = ["interaction_review_contract"]
skill_refs = ["bmad-po"]
context_mode = "shared"
done_criteria = ["for user-facing interaction changes, discoverability, interaction pattern, feedback/error handling, keyboard-a11y expectations, label/microcopy consistency across view-edit-save states, state-transition clarity and minimum interaction tests are explicit"]
verification_steps = []

[[steps]]
id = "test_design"
kind = "llm-subagent"
depends_on = ["interaction_review"]
inputs = ["interaction_review_contract"]
outputs = ["test_design_contract"]
skill_refs = ["bmad-qa"]
context_mode = "shared"
done_criteria = ["a concrete red-green-refactor test plan is explicit before implementation, covering happy path, validation, auth-permissions, error paths, keyboard interactions, regressions and relevant edge cases"]
verification_steps = []

[[steps]]
id = "test_materialization"
kind = "llm-subagent"
depends_on = ["test_design"]
inputs = ["test_design_contract", "interaction_review_contract"]
outputs = ["test_materialization_contract"]
skill_refs = ["bmad-qa", "bmad-dev"]
context_mode = "isolated"
done_criteria = ["P0 tests from the agreed test design are materialized on disk at explicit paths, their current red/green status is explicit, and implementation cannot proceed with missing or only-theoretical test coverage for the main risk surface"]
verification_steps = []

[[steps]]
id = "implement_change"
kind = "llm-subagent"
depends_on = ["test_materialization"]
inputs = ["interaction_review_contract", "test_design_contract", "test_materialization_contract"]
outputs = ["implementation_contract"]
skill_refs = ["bmad-dev"]
context_mode = "isolated"
done_criteria = ["minimal code change and tests are implemented against the agreed interaction contract and the materialized test surface"]
verification_steps = []

[[steps]]
id = "verify_change"
kind = "llm-subagent"
depends_on = ["implement_change"]
inputs = ["implementation_contract", "test_design_contract", "test_materialization_contract"]
outputs = ["verification_contract"]
skill_refs = ["bmad-qa"]
context_mode = "isolated"
done_criteria = ["exact commands run, tests added or updated, covered vs uncovered P0 risks, auth-permissions coverage status and user-facing interaction clarity are reviewed against the expected test design"]
verification_steps = []

[[steps]]
id = "browser_acceptance"
kind = "llm-subagent"
depends_on = ["verify_change"]
inputs = ["verification_contract", "test_design_contract", "interaction_review_contract"]
outputs = ["browser_acceptance_contract"]
skill_refs = ["agent-browser", "bmad-qa"]
context_mode = "isolated"
done_criteria = ["for browser-reachable user-facing changes, navigate the real app at https://localhost:8443 using seeded data, keep helper artifacts inside the repo, execute the critical acceptance path end-to-end and capture both functional failures and UX consistency observations with concrete evidence"]
verification_steps = []

[[steps]]
id = "workflow_retro"
kind = "llm-subagent"
depends_on = ["browser_acceptance"]
inputs = ["verification_contract", "browser_acceptance_contract"]
outputs = ["workflow_delta_contract"]
skill_refs = ["bmad-po"]
context_mode = "shared"
done_criteria = ["workflow improvement signal, interruption causes, keep-simplify-kill recommendation and any missed interaction or acceptance risk are explicit"]
verification_steps = []
